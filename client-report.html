<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--brand:#0A4033;--brand2:#0f5a47;--gold:#b88b35;--bg:#eef5f2;--card:#fff;--line:#dce7e2;--text:#10231d;--muted:#61746e;--red:#b83232;--green:#137a4b;--amber:#9a6b00;--blue:#1e6aa8}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(184,139,53,.14),transparent 32%),linear-gradient(180deg,#e8f3ef,#f7fbfa);color:var(--text)}button{font-family:inherit;border:0;background:var(--brand);color:#fff;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(10,64,51,.12)}button.light{background:#fff;color:var(--brand);border:1px solid var(--line);box-shadow:none}button.gold{background:linear-gradient(135deg,var(--gold),#d9b66b);color:#173b31}button.danger{background:#b83232}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;font-family:inherit;font-size:15px}label{display:block;font-weight:900;color:#183d33;margin:10px 0 6px}.container{width:min(1180px,94vw);margin:auto}.loading{min-height:80vh;display:grid;place-items:center;text-align:center}.loading-card{width:min(460px,92vw);background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:30px;padding:32px;box-shadow:0 24px 70px rgba(10,64,51,.16)}.loading-card img{width:190px;max-width:80%;background:#fff;border-radius:22px;padding:10px}.spinner{width:44px;height:44px;border-radius:50%;border:4px solid #dcebe5;border-top-color:var(--brand);margin:18px auto 0;animation:spin .9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.hero{margin:24px 0;background:linear-gradient(135deg,#08372d,var(--brand2));color:#fff;border-radius:34px;padding:28px;box-shadow:0 22px 60px rgba(10,64,51,.22);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:auto -90px -130px auto;width:330px;height:330px;border-radius:50%;background:rgba(255,255,255,.08)}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;position:relative}.brand{display:flex;align-items:center;gap:14px}.brand img{width:86px;height:58px;object-fit:contain;background:#fff;border-radius:18px;padding:7px}.brand b{font-size:18px}.brand small,.hero p{color:#dff1eb}.hero h1{font-size:34px;margin:26px 0 10px}.hero .intro{font-size:17px;line-height:1.9;max-width:850px}.project-pill{display:inline-block;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);padding:8px 13px;border-radius:999px;font-weight:900;color:#fff}.hero-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:22px;position:relative}.hero-action{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:22px;padding:18px;color:#fff;cursor:pointer;transition:.18s;min-height:126px}.hero-action:hover{transform:translateY(-3px);background:rgba(255,255,255,.18)}.hero-action .ico{font-size:30px}.hero-action h3{margin:10px 0 6px}.hero-action p{margin:0;font-size:13px;line-height:1.7}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 26px rgba(10,64,51,.06)}.stat small{color:var(--muted);display:block;margin-bottom:8px}.stat b{font-size:28px;color:var(--brand)}.card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:20px;margin:16px 0;box-shadow:0 10px 30px rgba(10,64,51,.06)}.card h2{margin:0 0 14px;color:var(--brand)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.smart-card{background:#fbfdfc;border:1px solid var(--line);border-radius:20px;padding:16px}.smart-card h3{margin:0 0 8px;color:var(--brand)}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8f4ee;color:var(--brand);font-size:12px;font-weight:900}.badge.red{background:#fde8e8;color:#9d2222}.badge.green{background:#e4f5ea;color:#0b7338}.badge.amber{background:#fff3d2;color:#8a5c00}.badge.blue{background:#e9f2fb;color:#1e6aa8}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;background:#fff;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:12px;text-align:right;vertical-align:top}th{background:#f0f7f4;color:#183d33}.empty{border:1px dashed #bdd4ca;border-radius:18px;padding:25px;text-align:center;color:var(--muted);background:#fbfdfc}.modal{position:fixed;inset:0;background:rgba(5,24,19,.72);display:none;align-items:center;justify-content:center;z-index:900;padding:16px;backdrop-filter:blur(8px)}.modal.open{display:flex}.modal-card{width:min(1120px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:30px;border:1px solid rgba(255,255,255,.5);box-shadow:0 35px 95px rgba(0,0,0,.32)}.modal-head{position:sticky;top:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:2}.modal-head h2{margin:0;color:#fff}.modal-head small{color:#dff1eb}.modal-body{padding:20px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{background:#eef6f3;color:var(--brand);border:1px solid var(--line);box-shadow:none}.tab.active{background:var(--brand);color:#fff}.service-gates{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gate{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fbfdfc;cursor:pointer}.gate:hover{box-shadow:0 12px 28px rgba(10,64,51,.08)}.images{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.img-card{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;cursor:pointer}.img-card img{width:100%;height:230px;object-fit:contain;background:#f7faf9;display:block}.img-cap{padding:8px 10px;color:var(--muted);font-size:12px}.scope{background:#f7fbfa;border:1px solid var(--line);border-radius:16px;padding:12px;line-height:1.8;margin:12px 0}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.footer{text-align:center;color:var(--muted);padding:28px}.toast{position:fixed;bottom:18px;right:18px;background:#0A4033;color:#fff;padding:12px 16px;border-radius:16px;box-shadow:0 16px 35px rgba(0,0,0,.2);z-index:1200;display:none}.toast.show{display:block}.img-modal{z-index:1100;background:rgba(0,0,0,.9)}.img-modal .modal-card{background:transparent;border:0;box-shadow:none;display:grid;place-items:center}.img-modal img{max-width:100%;max-height:78vh;background:#fff;border-radius:18px;object-fit:contain}.img-tools{display:flex;justify-content:space-between;align-items:center;width:100%;color:#fff;margin-bottom:10px}@media(max-width:900px){.top{display:block}.hero-actions,.stats,.grid,.service-gates,.images,.form-grid{grid-template-columns:1fr}.hero h1{font-size:27px}.hero-action{min-height:auto}table{font-size:13px}.modal-head{align-items:flex-start}.img-card img{height:auto;max-height:520px}}@media print{.hero-actions,.tabs,button,.modal{display:none!important}.hero,.card{box-shadow:none}.container{width:100%}}
</style>
</head>
<body onload="loadPortal()">
<div id="app" class="container loading"><div class="loading-card"><img src="tasneef_logo_print.png" alt="شركة تصنيف"><h2>شركة تصنيف لإدارة المرافق</h2><p>نجهّز بوابة مشروعكم الآن...</p><div class="spinner"></div></div></div>
<div id="mainModal" class="modal" onclick="backdropClose(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-head"><div><h2 id="modalTitle">بوابة العميل</h2><small id="modalSub">متابعة المشروع</small></div><button class="light" onclick="closeModal()">إغلاق</button></div><div id="modalBody" class="modal-body"></div></div></div>
<div id="imageModal" class="modal img-modal" onclick="closeImage()"><div class="modal-card"><div class="img-tools"><span id="imageTitle" class="badge">صورة</span><button class="light" onclick="closeImage()">إغلاق</button></div><img id="imagePreview" alt="صورة"></div></div>
<div id="toast" class="toast"></div>
<script>
const SUPABASE_URL = "https://zmjdqiswytxlbfgnfjfv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ADsAC5MtBCusDgX62c8NaQ_LyyuTPeb";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const E=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let portal={token:'',projectId:null,projectName:'',seedReport:null,reports:[],services:[],tickets:[],timeLogs:[]};
function toast(t,err){const x=$('toast');x.textContent=t;x.style.background=err?'#b83232':'#0A4033';x.classList.add('show');setTimeout(()=>x.classList.remove('show'),3200)}
function today(){return new Date().toISOString().slice(0,10)}
function monthStart(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`}
function nextMonthStart(){const d=new Date();return `${d.getMonth()===11?d.getFullYear()+1:d.getFullYear()}-${String((d.getMonth()+2-1)%12+1).padStart(2,'0')}-01`}
function dateOnly(v){return String(v||'').slice(0,10)||'-'}
function fmtDate(v){try{return new Date(v).toLocaleDateString('ar-SA')}catch(e){return dateOnly(v)}}
function fmtDateTime(v){try{return new Date(v).toLocaleString('ar-SA',{hour:'numeric',minute:'2-digit',year:'numeric',month:'2-digit',day:'2-digit'})}catch(e){return String(v||'-')}}
function minutesBetween(a,b){if(!a||!b)return 0;const x=new Date(a),y=new Date(b);const m=Math.round((y-x)/60000);return isFinite(m)&&m>0?m:0}
function minToHr(m){m=Number(m)||0;const h=Math.floor(m/60),r=m%60;return h?`${h} س ${r} د`:`${r} د`}
function arr(v){return Array.isArray(v)?v:[]}
function asImages(value){if(!value)return[];if(Array.isArray(value))return value.filter(Boolean);if(typeof value==='string'){try{const p=JSON.parse(value);return Array.isArray(p)?p.filter(Boolean):(p?[p]:[])}catch(e){return value.trim()?[value.trim()]:[]}}return typeof value==='object'?[value]:[]}
function getSrc(im){if(!im)return'';if(typeof im==='string')return im;return im.data||im.url||im.src||im.path||im.publicUrl||''}
function before(s){return asImages(s.before_images||s.before||s.beforeImages)}function during(s){return asImages(s.during_images||s.during||s.duringImages)}function after(s){return asImages(s.after_images||s.after||s.afterImages)}function imgCount(s){return before(s).length+during(s).length+after(s).length}
function statusLabel(s){s=String(s||'open');return s==='closed'?'مغلقة':s==='processing'?'قيد التنفيذ':s==='pending'?'بانتظار المعالجة':'مفتوحة'}
function statusClass(s){s=String(s||'open');return s==='closed'?'green':s==='processing'?'amber':'red'}
function ticketNo(t){return t.ticket_number||('T-'+String(t.id||0).padStart(4,'0'))}
function reportTitle(r){return r.title||r.report_type||'تقرير المشروع'}
function serviceName(s){return s.title||s.service_type||'خدمة'}
function serviceIcon(t){t=String(t||'');if(t.includes('حشرات'))return'🛡️';if(t.includes('خزان'))return'💧';if(t.includes('كهرباء'))return'💡';if(t.includes('سباكة'))return'🔧';if(t.includes('بيسمنت'))return'🅿️';if(t.includes('نفايات'))return'🗑️';if(t.includes('مصعد'))return'🛗';return'✅'}
async function safeQuery(label,promise){try{const r=await promise;if(r.error){console.warn(label,r.error.message);return[]}return r.data||[]}catch(e){console.warn(label,e);return[]}}
async function loadPortal(){
  const token=new URLSearchParams(location.search).get('token');portal.token=token||'';
  if(!token)return showError('رابط بوابة العميل غير صحيح.');
  let report=await safeQuery('client report', sb.from('client_reports').select('*').eq('public_token',token).maybeSingle());
  if(Array.isArray(report)) report=null;
  if(!report||!report.id)return showError('الرابط غير متاح حاليًا. تأكد من أن التقرير منشور وله رابط صحيح.');
  portal.seedReport=report; portal.projectId=report.project_id; portal.projectName=report.project_name||'المشروع';
  const start=monthStart(), end=nextMonthStart();
  const [reports,tickets,timeLogs]=await Promise.all([
    safeQuery('reports', sb.from('client_reports').select('*').eq('project_id',portal.projectId).order('report_date',{ascending:false}).limit(80)),
    safeQuery('tickets', sb.from('tickets').select('*').eq('project_id',portal.projectId).order('created_at',{ascending:false}).limit(300)),
    safeQuery('time logs', sb.from('time_logs').select('*').eq('project_id',portal.projectId).gte('log_date',start).lt('log_date',end).order('check_in',{ascending:false}).limit(1000))
  ]);
  portal.reports=(reports.length?reports:[report]).filter(r=>String(r.status||'').toLowerCase()!=='hidden');
  portal.tickets=tickets; portal.timeLogs=timeLogs;
  const ids=portal.reports.map(r=>r.id).filter(Boolean);
  portal.services=ids.length?await safeQuery('services', sb.from('client_report_services').select('*').in('report_id',ids).order('sort_order',{ascending:true}).limit(1000)):[];
  renderHome();
}
function showError(text){$('app').className='container loading';$('app').innerHTML=`<div class="loading-card"><img src="tasneef_logo_print.png"><h2 style="color:#b83232">${E(text)}</h2><p>شركة تصنيف لإدارة المرافق</p></div>`}
function stats(){const minutes=portal.timeLogs.reduce((s,l)=>s+(Number(l.duration_minutes)||minutesBetween(l.check_in,l.check_out)),0);const days=new Set(portal.timeLogs.map(l=>String(l.log_date||l.check_in||'').slice(0,10)).filter(Boolean)).size;const open=portal.tickets.filter(t=>String(t.status||'open')!=='closed').length;return{minutes,days,open,closed:portal.tickets.length-open,services:portal.services.length,reports:portal.reports.length}}
function renderHome(){const st=stats();$('app').className='container';document.title=`بوابة ${portal.projectName} - شركة تصنيف`; $('app').innerHTML=`
<section class="hero"><div class="top"><div class="brand"><img src="tasneef_logo_print.png" alt="تصنيف"><div><b>شركة تصنيف لإدارة المرافق</b><br><small>بوابة العميل الذكية لمتابعة المشروع</small></div></div><div><span class="project-pill">${E(portal.projectName)}</span></div></div><h1>مرحبًا بكم في بوابة مشروعكم</h1><p class="intro">نضع بين أيديكم شاشة موحدة لمتابعة تقارير المشروع، ساعات العمل، الأعمال المنفذة، والتذاكر التشغيلية المرتبطة بالمشروع بكل وضوح واحترافية.</p><div class="hero-actions"><div class="hero-action" onclick="openProjectReports()"><div class="ico">📊</div><h3>تقارير مشروعك</h3><p>نافذة ذكية تشمل ساعات العمل، الأعمال المنفذة، والتذاكر.</p></div><div class="hero-action" onclick="openTicketForm()"><div class="ico">🎫</div><h3>رفع تذكرة</h3><p>ارفع بلاغ جديد وسيظهر مباشرة في قسم التكتات.</p></div><div class="hero-action" onclick="openTicketsOnly()"><div class="ico">🔎</div><h3>متابعة التذاكر</h3><p>استعراض حالة التذاكر المفتوحة والمغلقة للمشروع.</p></div></div></section>
<section class="stats"><div class="stat"><small>ساعات العمل هذا الشهر</small><b>${E(minToHr(st.minutes))}</b></div><div class="stat"><small>الأعمال المنفذة</small><b>${st.services}</b></div><div class="stat"><small>التذاكر المفتوحة</small><b>${st.open}</b></div><div class="stat"><small>التقارير</small><b>${st.reports}</b></div></section>
<section class="card"><h2>تعريف مختصر</h2><p style="line-height:1.9;color:#31443d">شركة تصنيف لإدارة المرافق تقدم خدمات تشغيل وصيانة ونظافة ومتابعة ميدانية للمشاريع السكنية والتجارية، وهذه البوابة مخصصة لعرض بيانات مشروعكم فقط من النظام.</p></section>
<div class="footer">شركة تصنيف لإدارة المرافق<br>تم إنشاء هذه البوابة آليًا من نظام تصنيف</div>`}
function openModal(title,sub,body){$('modalTitle').textContent=title;$('modalSub').textContent=sub||'';$('modalBody').innerHTML=body;$('mainModal').classList.add('open');document.body.style.overflow='hidden'}
function closeModal(){$('mainModal').classList.remove('open');document.body.style.overflow=''}function backdropClose(e){if(e.target.id==='mainModal')closeModal()}
function openProjectReports(){openModal('تقارير مشروعك',portal.projectName,`<div class="tabs"><button class="tab active" onclick="switchPortalTab(this,'hours')">ساعات العمل</button><button class="tab" onclick="switchPortalTab(this,'works')">الأعمال المنفذة</button><button class="tab" onclick="switchPortalTab(this,'tickets')">التذاكر في المشروع</button></div><div id="tabContent">${hoursHtml()}</div>`)}
function switchPortalTab(btn,type){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');$('tabContent').innerHTML=type==='hours'?hoursHtml():type==='works'?worksHtml():ticketsHtml()}
function hoursHtml(){const st=stats();const rows=portal.timeLogs.map(l=>`<tr><td>${E(dateOnly(l.log_date||l.check_in))}</td><td>${E(fmtDateTime(l.check_in))}</td><td>${E(l.check_out?fmtDateTime(l.check_out):'-')}</td><td>${E(minToHr(Number(l.duration_minutes)||minutesBetween(l.check_in,l.check_out)))}</td><td>${E(l.notes||'-')}</td></tr>`).join('');return `<section class="grid"><div class="smart-card"><h3>إجمالي ساعات العمل</h3><b class="badge green">${E(minToHr(st.minutes))}</b></div><div class="smart-card"><h3>أيام الحضور</h3><b class="badge blue">${st.days} يوم</b></div><div class="smart-card"><h3>آخر تحديث</h3><b class="badge">${portal.timeLogs[0]?E(fmtDateTime(portal.timeLogs[0].updated_at||portal.timeLogs[0].created_at||portal.timeLogs[0].check_in)):'لا توجد بيانات'}</b></div></section><div class="card"><h2>تفاصيل ساعات العمل</h2>${rows?`<div class="table-wrap"><table><thead><tr><th>التاريخ</th><th>الدخول</th><th>الخروج</th><th>المدة</th><th>ملاحظات</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد ساعات عمل مسجلة لهذا الشهر.</div>'}</div>`}
function worksHtml(){const grouped=portal.reports.map(r=>{const ss=portal.services.filter(s=>String(s.report_id)===String(r.id));return `<div class="smart-card"><h3>${E(reportTitle(r))}</h3><p><span class="badge">${E(dateOnly(r.report_date||r.created_at))}</span> <span class="badge green">${ss.length} أعمال</span></p><p style="color:#60706a;line-height:1.7">${E(r.executive_summary||'تم توثيق الأعمال المنفذة ضمن هذا التقرير.')}</p><button onclick="openReportDetails('${E(r.id)}')">عرض تفاصيل التقرير</button></div>`}).join('');return `<div class="service-gates">${grouped||'<div class="empty">لا توجد تقارير مرتبطة بالمشروع.</div>'}</div>`}
function ticketsHtml(){const t=portal.tickets;const open=t.filter(x=>String(x.status||'open')!=='closed').length;const rows=t.map(x=>`<tr><td><b>${E(ticketNo(x))}</b></td><td>${E(x.title||'-')}<br><small>${E(x.description||'')}</small></td><td><span class="badge ${statusClass(x.status)}">${E(statusLabel(x.status))}</span></td><td>${E(x.priority||'عادي')}</td><td>${E(dateOnly(x.created_at))}</td><td>${E(x.closure_note||x.close_note||x.notes||'-')}</td></tr>`).join('');return `<section class="grid"><div class="smart-card"><h3>إجمالي التذاكر</h3><b class="badge blue">${t.length}</b></div><div class="smart-card"><h3>مفتوحة / قيد التنفيذ</h3><b class="badge red">${open}</b></div><div class="smart-card"><h3>مغلقة</h3><b class="badge green">${t.length-open}</b></div></section><div class="card"><h2>التذاكر المسجلة على المشروع</h2>${rows?`<div class="table-wrap"><table><thead><tr><th>رقم التذكرة</th><th>الموضوع</th><th>الحالة</th><th>الأولوية</th><th>تاريخ الفتح</th><th>آخر إجراء</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">لا توجد تذاكر مسجلة على هذا المشروع.</div>'}</div>`}
function openTicketsOnly(){openModal('متابعة التذاكر',portal.projectName,ticketsHtml())}
function openReportDetails(id){const r=portal.reports.find(x=>String(x.id)===String(id));if(!r)return;const ss=portal.services.filter(s=>String(s.report_id)===String(id));openModal(reportTitle(r),`تاريخ التقرير: ${dateOnly(r.report_date||r.created_at)}`,`<div class="scope"><b>ملخص التقرير:</b><br>${E(r.executive_summary||'تم تنفيذ الأعمال الموضحة في التقرير.').replace(/\n/g,'<br>')}</div><div class="service-gates">${ss.map(s=>`<div class="gate" onclick="openServiceDetails('${E(s.id)}')"><div style="font-size:30px">${serviceIcon(s.service_type||s.title)}</div><h3>${E(serviceName(s))}</h3><p><span class="badge green">${imgCount(s)} صورة</span></p></div>`).join('')||'<div class="empty">لا توجد أعمال داخل هذا التقرير.</div>'}</div>`)}
function openServiceDetails(id){const s=portal.services.find(x=>String(x.id)===String(id));if(!s)return;const stage=(title,imgs)=>imgs.length?`<h3 style="color:var(--brand)">${title}</h3><div class="images">${imgs.map((im,i)=>`<div class="img-card" onclick="openImage('${encodeURIComponent(getSrc(im))}','${E(title)}')"><img src="${E(getSrc(im))}"><div class="img-cap">${E(title)} - ${i+1}</div></div>`).join('')}</div>`:'';openModal(serviceName(s),s.service_type||'خدمة',`<div class="scope">${s.service_description?E(s.service_description).replace(/\n/g,'<br>'):'تفاصيل الخدمة الموثقة من المشرف.'}</div>${s.scope_work?`<div class="scope"><b>نطاق العمل:</b><br>${E(s.scope_work).replace(/\n/g,'<br>')}</div>`:''}${stage('قبل التنفيذ',before(s))}${stage('أثناء التنفيذ',during(s))}${stage('بعد التنفيذ',after(s))}${s.notes?`<div class="scope"><b>ملاحظات:</b><br>${E(s.notes).replace(/\n/g,'<br>')}</div>`:''}`)}
function openImage(src,title){$('imagePreview').src=decodeURIComponent(src);$('imageTitle').textContent=title||'صورة';$('imageModal').classList.add('open')}function closeImage(){$('imageModal').classList.remove('open')}
function openTicketForm(){openModal('رفع تذكرة',portal.projectName,`<div class="form-grid"><div><label>اسم مقدم الطلب</label><input id="newTicketName" placeholder="الاسم"></div><div><label>رقم الجوال</label><input id="newTicketPhone" placeholder="05xxxxxxxx"></div></div><div class="form-grid"><div><label>رقم الوحدة / الموقع</label><input id="newTicketUnit" placeholder="مثال: A-12 / السطح / المواقف"></div><div><label>نوع المشكلة</label><select id="newTicketType"><option>نظافة</option><option>كهرباء</option><option>سباكة</option><option>مصعد</option><option>مضخات</option><option>مكافحة حشرات</option><option>أخرى</option></select></div></div><label>وصف المشكلة</label><textarea id="newTicketDesc" rows="5" placeholder="اكتب تفاصيل البلاغ بوضوح"></textarea><div class="scope">سيتم إنشاء التذكرة مباشرة داخل قسم التكتات وربطها بمشروع: <b>${E(portal.projectName)}</b></div><button onclick="submitClientTicket(this)">إرسال التذكرة</button>`)}
async function submitClientTicket(btn){try{btn.disabled=true;const name=$('newTicketName')?.value.trim()||'';const phone=$('newTicketPhone')?.value.trim()||'';const unit=$('newTicketUnit')?.value.trim()||'';const type=$('newTicketType')?.value||'أخرى';const desc=$('newTicketDesc')?.value.trim()||'';if(!desc)throw new Error('اكتب وصف المشكلة');const title=`بلاغ من العميل - ${type}${unit?' - '+unit:''}`;const full=`مصدر البلاغ: بوابة العميل\nاسم مقدم الطلب: ${name||'-'}\nالجوال: ${phone||'-'}\nالوحدة / الموقع: ${unit||'-'}\nنوع المشكلة: ${type}\n\nالوصف:\n${desc}`;let res=await sb.from('tickets').insert({project_id:portal.projectId,title,description:full,priority:'normal',status:'open'}).select('*').single();if(res.error)throw res.error;try{if(res.data?.id&&!res.data?.ticket_number)await sb.from('tickets').update({ticket_number:'T-'+String(res.data.id).padStart(4,'0')}).eq('id',res.data.id)}catch(_){ }portal.tickets=[res.data,...portal.tickets];toast('تم استلام التذكرة بنجاح');openModal('تم رفع التذكرة','سيتم التعامل معها من فريق التشغيل',`<div class="empty"><h2>تم إنشاء التذكرة بنجاح</h2><p>رقم التذكرة: <b>${E(ticketNo(res.data))}</b></p><button onclick="openTicketsOnly()">متابعة التذاكر</button></div>`)}catch(e){toast(e.message||String(e),true)}finally{if(btn)btn.disabled=false}}
</script>
</body>
</html>
