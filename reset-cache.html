<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تنظيف كاش تصنيف</title><style>body{font-family:Tahoma,Arial;background:#f4f8f6;color:#064c3f;display:grid;place-items:center;min-height:100vh}.card{background:#fff;border:1px solid #cfe2dc;border-radius:22px;padding:28px;max-width:520px;box-shadow:0 18px 45px #0001}button{background:#064c3f;color:#fff;border:0;border-radius:12px;padding:12px 18px;font-weight:800;cursor:pointer}</style></head><body><div class="card"><h2>تنظيف كاش النظام</h2><p>اضغط الزر لمسح النسخ القديمة التي قد تجعل البيانات تظهر صفر.</p><button onclick="clean()">تنظيف الكاش الآن</button><p id="msg"></p></div><script>async function clean(){try{if('serviceWorker'in navigator){let rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()));}if('caches'in window){let ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)));}for(let i=localStorage.length-1;i>=0;i--){let k=localStorage.key(i);if(k && !['tasneef_user','tasneef_session'].includes(k)) localStorage.removeItem(k);}document.getElementById('msg').textContent='تم التنظيف. سيتم فتح لوحة التحكم الآن.';setTimeout(()=>location.href='admin.html?v=275',900)}catch(e){document.getElementById('msg').textContent='حدث خطأ: '+e.message}}</script></body></html>
